version: '3.8'

networks:
  stoxly-net:
    driver: bridge

volumes:
  redis_data:
  postgres_data:

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: stoxly
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stoxly_secret}
      POSTGRES_DB: stoxly
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - stoxly-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stoxly"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - stoxly-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://stoxly:${POSTGRES_PASSWORD:-stoxly_secret}@postgres:5432/stoxly
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - backend_logs:/app/logs
    networks:
      - stoxly-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - stoxly-net
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  backend_logs:
