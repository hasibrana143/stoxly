name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stock-trading-platform/backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          SECRET_KEY: ci-secret-key-32chars-test
          CORS_ORIGINS: http://localhost:3000
          DATABASE_URL: sqlite:///./test.db
        run: |
          pip install pytest-cov
          python -m pytest tests/ -v --tb=short --cov=. --cov-report=term --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          file: ./stock-trading-platform/backend/coverage.xml

      - name: Security scan (pip-audit)
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit --desc on

      - name: Security scan (bandit)
        continue-on-error: true
        run: |
          pip install bandit
          bandit -r . -f json -o bandit-report.json || true

      - name: Lint check
        continue-on-error: true
        run: |
          pip install ruff
          ruff check . --ignore E501
