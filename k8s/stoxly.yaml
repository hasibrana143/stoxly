apiVersion: v1
kind: ConfigMap
metadata:
  name: stoxly-config
  namespace: stoxly
data:
  APP_NAME: "Stoxly.ai API"
  VERSION: "1.0.0"
  DEBUG: "false"
  CORS_ORIGINS: "https://stoxly.ai"
  REDIS_URL: "redis://redis-service:6379/0"
  PASSWORD_EXPIRY_DAYS: "90"
  PASSWORD_HISTORY_COUNT: "5"
  # ---
  IP_ABUSE_THRESHOLD: "100"
  IP_ABUSE_WINDOW: "60"
  IP_ABUSE_BLOCK_DURATION: "300"
  AUDIT_LOG_DIR: "/app/logs"
---
apiVersion: v1
kind: Secret
metadata:
  name: stoxly-secrets
  namespace: stoxly
type: Opaque
stringData:
  DATABASE_URL: "postgresql://stoxly:CHANGE_ME@postgres-service:5432/stoxly"
  SECRET_KEY: "CHANGE_ME_TO_A_LONG_RANDOM_STRING"
  SENTRY_DSN: ""
  RECAPTCHA_SITE_KEY: ""
  RECAPTCHA_SECRET_KEY: ""
  SMTP_HOST: ""
  SMTP_USER: ""
  SMTP_PASSWORD: ""
  SMTP_FROM: "noreply@stoxly.ai"
  GEMINI_API_KEY: ""
  DEMO_USER_EMAIL: ""
  DEMO_USER_PASSWORD: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stoxly-backend
  namespace: stoxly
spec:
  replicas: 3
  selector:
    matchLabels:
      app: stoxly-backend
  template:
    metadata:
      labels:
        app: stoxly-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/hasibrana143/stoxly-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: stoxly-config
            - secretRef:
                name: stoxly-secrets
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          volumeMounts:
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: stoxly-backend-service
  namespace: stoxly
spec:
  selector:
    app: stoxly-backend
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stoxly-ingress
  namespace: stoxly
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://stoxly.ai"
spec:
  tls:
    - hosts:
        - api.stoxly.ai
      secretName: stoxly-tls
  rules:
    - host: api.stoxly.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stoxly-backend-service
                port:
                  number: 8000
